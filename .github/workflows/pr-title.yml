name: PR title

# Validate the PR title against Conventional Commits. Inline regex (no third-party
# action) so there is nothing to deprecate. See CONTRIBUTING.md.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"
          pattern='^(feat|fix|docs|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?!?: .+'
          if [[ ! "$TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(models): add Card model'."
            echo "Allowed types: feat, fix, docs, refactor, perf, test, build, ci, chore, revert."
            exit 1
          fi
          echo "OK"
