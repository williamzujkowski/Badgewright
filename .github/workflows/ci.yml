name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project (dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy (strict, src)
        run: mypy src/steam_badge_optimizer/

      - name: Pytest
        run: pytest -q

  safety-gate:
    name: read-only safety gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      # The load-bearing boundary: if these regress, the tool could act on a Steam
      # account. Run them as an isolated, always-required gate.
      - name: Enforce read-only boundary
        run: pytest -q tests/unit/test_safety.py tests/unit/test_no_mutating_http.py

  docker:
    name: docker build & fixture demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t badgewright:ci .
      - name: Runs as a non-root user
        run: |
          uid=$(docker run --rm --entrypoint id badgewright:ci -u)
          echo "container uid: $uid"
          test "$uid" = "10001"
      - name: Hardened fixture demo (import + list persist in a volume)
        run: |
          docker volume create bw-ci-data
          docker run --rm --read-only --tmpfs /tmp --security-opt no-new-privileges \
            --cap-drop ALL -v bw-ci-data:/data \
            -v "$PWD/tests/fixtures/badges.json:/in/badges.json:ro" \
            badgewright:ci catalog import --file /in/badges.json
          out=$(docker run --rm --read-only --tmpfs /tmp --security-opt no-new-privileges \
            --cap-drop ALL -v bw-ci-data:/data badgewright:ci catalog list)
          echo "$out"
          echo "$out" | grep -q "Team Fortress 2"
      - name: Image bakes no user database or secrets
        run: |
          # Scan the WHOLE filesystem (as root so nothing is hidden) — a database, .env,
          # or secret must never be baked into any layer; local data lives only in the
          # mounted volume at runtime.
          found=$(docker run --rm --user 0 --entrypoint sh badgewright:ci -c \
            'find / -xdev \( -name "*.sqlite3" -o -name "*.db" -o -name ".env" \) 2>/dev/null')
          if [ -n "$found" ]; then
            echo "ERROR: database/secret baked into the image:"; echo "$found"; exit 1
          fi
          echo "clean: no baked database or secrets"
