version: 2
updates:
  # Keep GitHub Actions pinned to current, non-deprecated majors.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Keep Python dependencies current.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  # Keep the Docker base image (tag + pinned digest) current.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
